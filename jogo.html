<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Damas Grandmaster: Ultimate 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap');
        :root{--primary:#ff4757;--gold:#ffd700;--glass:rgba(255,255,255,0.05);--cell-l:#ecf0f1;--cell-d:#34495e;}
        body.theme-classic{--cell-l:#f0d9b5;--cell-d:#b58863;background:linear-gradient(135deg,#2c1a0d,#000);}
        body.theme-neon   {--cell-l:#1a1a1a;--cell-d:#130f40;--primary:#00f2ff;background:radial-gradient(circle,#001a1a,#000);}
        body.theme-mars   {--cell-l:#e67e22;--cell-d:#780000;background:linear-gradient(to bottom,#4d0000,#000);}
        body.theme-luxury {--cell-l:#fff;--cell-d:#222;background:linear-gradient(45deg,#111,#333);}
        *{box-sizing:border-box;}
        body{margin:0;color:#fff;font-family:'Poppins',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden;}
        #top-hud{width:100%;padding:12px 18px;background:rgba(0,0,0,0.85);backdrop-filter:blur(15px);display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--primary);z-index:100;}
        .xp-container{width:90px;}
        .xp-bar{width:100%;height:7px;background:#222;border-radius:20px;border:1px solid #444;overflow:hidden;margin-top:4px;}
        #xp-fill{width:45%;height:100%;background:linear-gradient(90deg,#ffd700,#ff9f43);box-shadow:0 0 8px var(--gold);}
        #game-view{display:none;flex-direction:column;align-items:center;width:100%;padding-top:12px;}
        #board-frame{padding:10px;background:linear-gradient(145deg,#333,#111);border-radius:8px;box-shadow:0 20px 40px rgba(0,0,0,0.8),inset 0 0 15px #000;border:2px solid #444;position:relative;}
        #board{display:grid;width:85vw;height:85vw;max-width:400px;max-height:400px;background:#000;border:1px solid #000;}
        .cell{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:visible;}
        .cell.light{background:linear-gradient(145deg,var(--cell-l),#bdc3c7);}
        .cell.dark{background:linear-gradient(145deg,var(--cell-d),#2c3e50);box-shadow:inset 0 0 10px rgba(0,0,0,0.2);}
        .piece{width:80%;height:80%;border-radius:50%;position:absolute;cursor:pointer;transition:transform .15s cubic-bezier(.175,.885,.32,1.275),filter .15s;display:flex;align-items:center;justify-content:center;z-index:5;}
        .piece.red  {background:radial-gradient(circle at 35% 35%,#ff5e57,#ff4757 40%,#8b0000);box-shadow:0 5px 0 #5e0000,0 8px 15px rgba(0,0,0,.5);}
        .piece.black{background:radial-gradient(circle at 35% 35%,#57606f,#2f3542 40%,#000);box-shadow:0 5px 0 #111,0 8px 15px rgba(0,0,0,.6);}
        .piece.king::after{content:'👑';font-size:1.1rem;position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);filter:drop-shadow(0 2px 2px rgba(0,0,0,.8));}
        .piece.moving{position:fixed!important;z-index:9999!important;pointer-events:none;transition:left .28s ease,top .28s ease!important;}
        .piece.hint-glow{animation:hint-pulse .6s infinite alternate;z-index:10;}
        @keyframes hint-pulse{0%{box-shadow:0 0 0 0 rgba(0,255,200,.6),0 5px 0 #5e0000;}100%{box-shadow:0 0 20px 6px rgba(0,255,200,.9),0 5px 0 #5e0000;}}
        .selected{transform:scale(1.1) translateY(-5px);filter:brightness(1.2);z-index:10;}
        .highlight{background:radial-gradient(circle,rgba(255,215,0,.5) 20%,transparent 70%)!important;cursor:pointer;}
        .must{animation:pulse-gold 1s infinite;border:2px solid var(--gold);}
        @keyframes pulse-gold{0%{box-shadow:0 0 0 var(--gold);}50%{box-shadow:0 0 15px var(--gold);}100%{box-shadow:0 0 0 var(--gold);}}
        .particle{position:fixed;border-radius:50%;pointer-events:none;z-index:9998;animation:pb .5s ease-out forwards;}
        @keyframes pb{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}}
        #hud-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap;justify-content:center;}
        #turn-indicator{font-family:'Orbitron';font-size:0.56rem;padding:5px 11px;border-radius:20px;letter-spacing:2px;transition:background .3s,color .3s;}
        #turn-indicator.red-turn  {background:rgba(255,71,87,.25);border:1px solid #ff4757;color:#ff4757;}
        #turn-indicator.black-turn{background:rgba(100,100,100,.25);border:1px solid #aaa;color:#ccc;}
        #timer-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
        #timer-bar-bg{width:85px;height:7px;background:#222;border-radius:10px;overflow:hidden;border:1px solid #444;}
        #timer-bar{height:100%;width:100%;border-radius:10px;transition:width .9s linear,background .5s;}
        #timer-num{font-family:'Orbitron';font-size:.62rem;color:#fff;}
        #music-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:.7rem;cursor:pointer;color:#fff;transition:.2s;}
        #music-btn:hover{background:rgba(255,255,255,.15);}
        #bottom-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
        .btn-sm{padding:8px 14px;border:none;border-radius:30px;font-family:'Orbitron';font-weight:900;font-size:.56rem;cursor:pointer;transition:.2s;color:#fff;}
        .btn-sm:hover{transform:scale(1.05);}
        .btn-undo  {background:linear-gradient(145deg,#e67e22,#ca6f1e);}
        .btn-hint  {background:linear-gradient(145deg,#00b894,#00a383);}
        .btn-stats {background:linear-gradient(145deg,#2980b9,#1a6fa8);}
        .btn-trofeu{background:linear-gradient(145deg,#8e44ad,#6c3483);}
        .btn-rank  {background:linear-gradient(145deg,#d4ac0d,#b7950b);}
        .btn-miss  {background:linear-gradient(145deg,#e74c3c,#c0392b);}
        .btn-abandon{background:#222;}
        #log-area{width:85vw;max-width:400px;margin-top:8px;background:var(--glass);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;backdrop-filter:blur(10px);}
        #battle-log{height:48px;overflow-y:auto;font-family:'Orbitron',monospace;font-size:.58rem;color:#00d2d3;}
        #main-menu{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;overflow-y:auto;padding:20px;}
        .btn-premium{background:linear-gradient(145deg,var(--primary),#b33939);color:#fff;padding:12px 28px;border:none;border-radius:50px;font-family:'Orbitron';font-weight:900;font-size:.82rem;cursor:pointer;margin:4px;width:260px;box-shadow:0 8px 15px rgba(255,71,87,.3);transition:.2s;}
        .btn-premium:hover{transform:scale(1.03);}
        .menu-label{font-size:.5rem;color:#888;letter-spacing:3px;text-transform:uppercase;margin-bottom:5px;font-family:'Orbitron';text-align:center;}
        .diff-row{display:flex;gap:6px;width:260px;margin-bottom:7px;}
        .diff-btn{flex:1;padding:8px 0;border:none;border-radius:30px;font-family:'Orbitron';font-weight:900;font-size:.6rem;cursor:pointer;transition:.2s;color:#fff;}
        .diff-btn.easy{background:#27ae60;}.diff-btn.medium{background:#e67e22;}.diff-btn.hard{background:#c0392b;}
        .diff-btn.active{box-shadow:0 0 14px 3px currentColor;transform:scale(1.07);}
        /* nick input */
        #nick-wrap{display:flex;gap:8px;width:260px;margin-bottom:6px;align-items:center;}
        #nick-input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:30px;padding:9px 14px;font-family:'Orbitron';font-size:.6rem;color:#fff;outline:none;}
        #nick-input::placeholder{color:#555;}
        /* overlays */
        .overlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.95);padding:22px;border-radius:16px;text-align:center;z-index:400;display:none;max-width:340px;width:92vw;border:2px solid var(--gold);box-shadow:0 0 40px rgba(255,215,0,.4);max-height:85vh;overflow-y:auto;}
        .overlay h2{font-family:'Orbitron';margin:0 0 12px;font-size:.95rem;}
        .ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
        .ach-card{padding:7px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);text-align:center;}
        .ach-card.unlocked{border-color:var(--gold);background:rgba(255,215,0,.12);}
        .ach-icon{font-size:1.4rem;}
        .ach-name{font-size:.46rem;font-family:'Orbitron';color:#aaa;margin-top:2px;}
        .ach-card.unlocked .ach-name{color:var(--gold);}
        #toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.92);border:1px solid var(--gold);padding:9px 20px;border-radius:30px;font-family:'Orbitron';font-size:.62rem;color:var(--gold);z-index:9999;display:none;white-space:nowrap;box-shadow:0 0 20px rgba(255,215,0,.4);}
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
        .stat-card{background:rgba(255,255,255,.06);border-radius:10px;padding:9px;border:1px solid rgba(255,255,255,.1);}
        .stat-val{font-family:'Orbitron';font-size:1.2rem;color:var(--gold);}
        .stat-lbl{font-size:.45rem;color:#888;text-transform:uppercase;letter-spacing:1px;}
        /* ranking */
        .rank-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);margin-bottom:5px;}
        .rank-pos{font-family:'Orbitron';font-size:.75rem;color:var(--gold);min-width:28px;}
        .rank-name{font-family:'Orbitron';font-size:.6rem;color:#fff;flex:1;text-align:left;margin-left:8px;}
        .rank-score{font-family:'Orbitron';font-size:.6rem;color:#00d2d3;}
        .rank-you{border-color:var(--gold)!important;background:rgba(255,215,0,.08)!important;}
        /* missions */
        .miss-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px;margin-bottom:7px;text-align:left;}
        .miss-card.done{border-color:#27ae60;background:rgba(39,174,96,.1);}
        .miss-title{font-family:'Orbitron';font-size:.58rem;color:#fff;}
        .miss-prog-bg{width:100%;height:5px;background:#222;border-radius:10px;overflow:hidden;margin-top:6px;}
        .miss-prog-bar{height:100%;border-radius:10px;background:linear-gradient(90deg,#00b894,#00cec9);transition:width .4s;}
        .miss-reward{font-size:.45rem;color:var(--gold);margin-top:4px;font-family:'Orbitron';}
        /* end */
        #end-game-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.93);padding:26px;border:2px solid var(--gold);border-radius:15px;text-align:center;z-index:350;display:none;box-shadow:0 0 50px rgba(255,215,0,.5);max-width:320px;width:90vw;}
        #end-stats{font-size:.58rem;color:#aaa;margin:7px 0 12px;font-family:'Orbitron';line-height:1.7;}
        /* SKINS */
        .piece.skin-emoji{font-size:1.35rem;line-height:1;}
        .skin-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
        .skin-opt{padding:8px 4px;border-radius:10px;background:rgba(255,255,255,.06);border:2px solid transparent;cursor:pointer;font-size:1.2rem;transition:.2s;text-align:center;}
        .skin-opt:hover{border-color:rgba(255,255,255,.3);}
        .skin-opt.active{border-color:var(--gold);background:rgba(255,215,0,.15);}
        .skin-lbl{font-size:.36rem;font-family:'Orbitron';color:#888;margin-top:2px;}
        /* MOEDA FLUTUANTE */
        .float-coin{position:fixed;font-family:'Orbitron';font-weight:900;font-size:.72rem;color:#ffd700;pointer-events:none;z-index:9997;text-shadow:0 0 8px rgba(255,215,0,.8);animation:float-up .9s ease-out forwards;}
        @keyframes float-up{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-48px) scale(1.15);}}
        /* ANIMAÇÃO DE ENTRADA */
        @keyframes piece-drop{0%{opacity:0;transform:translateY(-36px) scale(.5);}70%{transform:translateY(3px) scale(1.1);}100%{opacity:1;transform:translateY(0) scale(1);}}
        .piece.entering{animation:piece-drop .38s cubic-bezier(.175,.885,.32,1.275) both;}
        /* TORNEIO */
        #tourn-banner{font-family:'Orbitron';font-size:.6rem;color:var(--gold);text-align:center;padding:4px 0 6px;letter-spacing:2px;}
        .tourn-score{display:flex;justify-content:center;gap:16px;margin-bottom:6px;}
        .tourn-side{text-align:center;}
        .tourn-side-lbl{font-family:'Orbitron';font-size:.45rem;color:#888;margin-bottom:4px;}
        .tourn-pips{display:flex;gap:5px;justify-content:center;}
        .tourn-pip{width:14px;height:14px;border-radius:50%;border:2px solid #444;transition:.3s;}
        .tourn-pip.won{border-color:var(--gold);background:var(--gold);box-shadow:0 0 6px var(--gold);}
        .tourn-pip.loss{background:#333;border-color:#555;}
        .skin-opt.locked-skin{opacity:.45;cursor:not-allowed;}
        .skin-opt.locked-skin:hover{border-color:transparent;}
        /* FASES */
        .phase-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;margin-bottom:7px;text-align:left;cursor:pointer;transition:.2s;}
        .phase-card.done{border-color:#27ae60;background:rgba(39,174,96,.08);}
        .phase-card.next{border-color:var(--gold);background:rgba(255,215,0,.08);}
        .phase-card.locked{opacity:.4;cursor:not-allowed;}
        .phase-card.next:hover,.phase-card.done:hover{transform:scale(1.01);}
        .phase-num{font-family:'Orbitron';font-size:.6rem;color:#fff;}
        .phase-desc{font-size:.46rem;color:#888;font-family:'Orbitron';margin-top:3px;}
        .phase-reward{font-size:.95rem;}
        /* PEÇAS FANTASMA */
        .ghost{position:absolute;width:80%;height:80%;border-radius:50%;opacity:.28;pointer-events:none;z-index:3;border:2px dashed rgba(255,255,255,.5);animation:ghost-pulse .9s ease-in-out infinite alternate;}
        @keyframes ghost-pulse{0%{opacity:.18;}100%{opacity:.38;}}
        /* CONFETE */
        .confetti-piece{position:fixed;pointer-events:none;z-index:9996;border-radius:2px;animation:confetti-fall var(--dur) ease-in forwards;}
        @keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(var(--rot));opacity:0;}}
        /* MODO RELÂMPAGO */
        body.lightning #board-frame{border-color:#f9ca24;box-shadow:0 0 20px rgba(249,202,36,.5),0 20px 40px rgba(0,0,0,.8);}
        body.lightning #turn-indicator.red-turn{border-color:#f9ca24;color:#f9ca24;background:rgba(249,202,36,.15);}
        #lightning-badge{display:none;font-family:'Orbitron';font-size:.52rem;background:linear-gradient(145deg,#f9ca24,#e67e22);color:#000;padding:3px 10px;border-radius:20px;font-weight:900;letter-spacing:1px;}
        @keyframes screen-flash{0%{opacity:0;}30%{opacity:.25;}100%{opacity:0;}}
        #flash-overlay{position:fixed;inset:0;background:#ff4757;pointer-events:none;z-index:8888;opacity:0;}
    </style>
</head>
<body class="theme-classic">

<div id="flash-overlay"></div>
<div id="toast"></div>

<!-- FASES -->
<div class="overlay" id="phase-overlay">
    <h2>⚔️ FASES</h2>
    <div style="font-size:.45rem;color:#888;font-family:'Orbitron';margin-bottom:10px;">Vença cada fase para desbloquear uma skin</div>
    <div id="phase-list"></div>
    <button class="btn-premium" onclick="closeOverlay('phase-overlay')" style="width:auto;font-size:.68rem;margin-top:4px;">FECHAR</button>
</div>

<!-- SKINS -->
<div class="overlay" id="skin-overlay">
    <h2>🎭 SKINS</h2>
    <div style="font-size:.5rem;color:#888;font-family:'Orbitron';margin-bottom:8px;">VERMELHO</div>
    <div class="skin-picker" id="skin-red-picker"></div>
    <div style="font-size:.5rem;color:#888;font-family:'Orbitron';margin-bottom:8px;">PRETO</div>
    <div class="skin-picker" id="skin-black-picker"></div>
    <button class="btn-premium" onclick="closeOverlay('skin-overlay')" style="width:auto;font-size:.68rem;">FECHAR</button>
</div>

<!-- TORNEIO OVERLAY (resultado entre rounds) -->
<div class="overlay" id="tourn-overlay">
    <h2>🏆 TORNEIO</h2>
    <div id="tourn-round-title" style="font-family:'Orbitron';font-size:.65rem;color:#aaa;margin-bottom:10px;"></div>
    <div class="tourn-score" id="tourn-score-display"></div>
    <div id="tourn-msg" style="font-family:'Orbitron';font-size:.7rem;color:var(--gold);margin:10px 0;"></div>
    <button class="btn-premium" id="tourn-next-btn" onclick="tournNextRound()" style="width:auto;">PRÓXIMA RODADA</button>
    <button class="btn-premium" onclick="location.reload()" style="width:auto;background:#333;font-size:.65rem;margin-top:5px;">ABANDONAR</button>
</div>

<!-- END GAME -->
<div id="end-game-msg">
    <h2 id="end-title" style="font-family:'Orbitron';margin:0 0 5px;"></h2>
    <div id="end-stats"></div>
    <button class="btn-premium" onclick="location.reload()" style="width:auto;">JOGAR NOVAMENTE</button>
</div>

<!-- CONQUISTAS -->
<div class="overlay" id="ach-overlay">
    <h2>🏆 CONQUISTAS</h2>
    <div class="ach-grid" id="ach-grid"></div>
    <button class="btn-premium" onclick="closeOverlay('ach-overlay')" style="width:auto;font-size:.68rem;">FECHAR</button>
</div>

<!-- STATS -->
<div class="overlay" id="stats-overlay">
    <h2>📊 RECORDES</h2>
    <div class="stats-grid" id="stats-grid"></div>
    <button class="btn-premium" onclick="resetStats()" style="width:auto;background:#333;font-size:.62rem;margin-right:5px;">ZERAR</button>
    <button class="btn-premium" onclick="closeOverlay('stats-overlay')" style="width:auto;font-size:.62rem;">FECHAR</button>
</div>

<!-- RANKING -->
<div class="overlay" id="rank-overlay">
    <h2>🏅 RANKING</h2>
    <div id="rank-list"></div>
    <button class="btn-premium" onclick="closeOverlay('rank-overlay')" style="width:auto;font-size:.68rem;margin-top:6px;">FECHAR</button>
</div>

<!-- MISSÕES -->
<div class="overlay" id="miss-overlay">
    <h2>📋 MISSÕES DO DIA</h2>
    <div id="miss-list"></div>
    <div id="miss-reset-info" style="font-size:.45rem;color:#555;font-family:'Orbitron';margin-top:4px;"></div>
    <button class="btn-premium" onclick="closeOverlay('miss-overlay')" style="width:auto;font-size:.68rem;margin-top:8px;">FECHAR</button>
</div>

<!-- MENU -->
<div id="main-menu">
    <h1 style="font-family:'Orbitron';font-size:2.2rem;margin-bottom:0;background:linear-gradient(var(--gold),#ff9f43);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;">GRANDMASTER</h1>
    <p style="letter-spacing:6px;font-size:.56rem;opacity:.6;margin-bottom:12px;">WORLD CHAMPIONSHIP</p>

    <div class="menu-label">Seu Apelido</div>
    <div id="nick-wrap">
        <input id="nick-input" type="text" maxlength="12" placeholder="Digite aqui..." />
    </div>

    <div class="menu-label">Dificuldade da IA</div>
    <div class="diff-row">
        <button class="diff-btn easy active" id="btn-easy"   onclick="setDiff('easy')">FÁCIL</button>
        <button class="diff-btn medium"       id="btn-medium" onclick="setDiff('medium')">MÉDIO</button>
        <button class="diff-btn hard"         id="btn-hard"   onclick="setDiff('hard')">DIFÍCIL</button>
    </div>

    <button class="btn-premium" onclick="startWithNick('br','ai')">VS IA — 8×8</button>
    <button class="btn-premium" onclick="startWithNick('int','ai')" style="background:#2c3e50;">VS IA — 10×10</button>
    <button class="btn-premium" onclick="startWithNick('br','pvp')"  style="background:linear-gradient(145deg,#8e44ad,#6c3483);">2 JOGADORES — 8×8</button>
    <button class="btn-premium" onclick="startWithNick('int','pvp')" style="background:linear-gradient(145deg,#5b2c6f,#3d1a5e);">2 JOGADORES — 10×10</button>
    <button class="btn-premium" onclick="startTournament()" style="background:linear-gradient(145deg,#d4ac0d,#b7950b);">🏆 TORNEIO (MELHOR DE 3)</button>
    <button class="btn-premium" onclick="startLightning()" style="background:linear-gradient(145deg,#f9ca24,#e67e22);color:#000;">⚡ MODO RELÂMPAGO</button>
    <button class="btn-premium" onclick="openPhaseSelect()" style="background:linear-gradient(145deg,#6c5ce7,#4a3ab0);">⚔️ MODO FASES</button>

    <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;justify-content:center;">
        <button class="btn-sm btn-rank"   onclick="openRanking()">🏅 RANKING</button>
        <button class="btn-sm btn-miss"   onclick="openMissions()">📋 MISSÕES</button>
        <button class="btn-sm btn-stats"  onclick="openStats()">📊 RECORDES</button>
        <button class="btn-sm btn-trofeu" onclick="openAchievements()">🏆</button>
        <button class="btn-sm" style="background:linear-gradient(145deg,#e84393,#c0175d);" onclick="openSkins()">🎭</button>
    </div>
    <button class="btn-premium" onclick="cycleTheme()" style="background:#222;font-size:.66rem;margin-top:5px;">CENÁRIO DINÂMICO</button>
</div>

<!-- HUD -->
<div id="top-hud">
    <div class="xp-container">
        <span style="font-size:.5rem;font-family:'Orbitron';">RANK: <span id="lvl">4</span></span>
        <div class="xp-bar"><div id="xp-fill"></div></div>
    </div>

<script>
// ========== ÁUDIO ==========
const AudioEngine={
    ctx:null,init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();},
    play(freq,type,dur,vol){this.init();const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=type;o.frequency.setValueAtTime(freq,this.ctx.currentTime);g.gain.setValueAtTime(vol,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.01,this.ctx.currentTime+dur);o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+dur);},
    click(){this.play(800,'sine',.1,.2);},move(){this.play(400,'triangle',.15,.1);},
    capture(){this.play(150,'square',.2,.1);setTimeout(()=>this.play(100,'square',.2,.1),100);},
    king(){[440,554,659,880].forEach((f,i)=>setTimeout(()=>this.play(f,'sine',.4,.1),i*100));},
    start(){[200,400,600].forEach((f,i)=>setTimeout(()=>this.play(f,'sawtooth',.3,.05),i*150));this.ambience();},
    victory(){[523,659,783,1046].forEach((f,i)=>setTimeout(()=>this.play(f,'sine',.6,.2),i*150));},
    defeat(){[300,250,200,150].forEach((f,i)=>setTimeout(()=>this.play(f,'sawtooth',.5,.2),i*200));},
    tick(){this.play(600,'square',.05,.05);},
    ambience(){
        if(!this.ctx)return;
        const bs=2*this.ctx.sampleRate,buf=this.ctx.createBuffer(1,bs,this.ctx.sampleRate),out=buf.getChannelData(0);
        for(let i=0;i<bs;i++)out[i]=Math.random()*2-1;
        const wn=this.ctx.createBufferSource();wn.buffer=buf;wn.loop=true;
        const f=this.ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=400;
        const g=this.ctx.createGain();g.gain.value=.02;
        wn.connect(f);f.connect(g);g.connect(this.ctx.destination);wn.start();
    }
};

// ========== MÚSICA TEMÁTICA ==========
let musicOn=true, musicNodes=[], musicGain=null, musicLoopId=null;

function buildMusic(){
    AudioEngine.init();
    const ctx=AudioEngine.ctx;
    musicGain=ctx.createGain(); musicGain.gain.value=.04; musicGain.connect(ctx.destination);
    const melody=[261,293,329,349,392,349,329,293];
    let t=ctx.currentTime+0.1;
    function scheduleLoop(){
        melody.forEach((freq,i)=>{
            const o=ctx.createOscillator(), g=ctx.createGain();
            o.type='sine'; o.frequency.value=freq;
            g.gain.setValueAtTime(0,t+i*.35);
            g.gain.linearRampToValueAtTime(.6,t+i*.35+.05);
            g.gain.linearRampToValueAtTime(0,t+i*.35+.3);
            o.connect(g); g.connect(musicGain);
            o.start(t+i*.35); o.stop(t+i*.35+.35);
            musicNodes.push(o);
        });
        [130,130,146,130].forEach((freq,i)=>{
            const o=ctx.createOscillator(),g=ctx.createGain();
            o.type='triangle'; o.frequency.value=freq;
            g.gain.setValueAtTime(0,t+i*.7);
            g.gain.linearRampToValueAtTime(.4,t+i*.7+.05);
            g.gain.linearRampToValueAtTime(0,t+i*.7+.6);
            o.connect(g);g.connect(musicGain);
            o.start(t+i*.7);o.stop(t+i*.7+.7);
            musicNodes.push(o);
        });
        t+=melody.length*.35;
        if(musicNodes.length>30) musicNodes=musicNodes.slice(-20);
    }
    scheduleLoop();
    musicLoopId=setInterval(()=>{ if(!musicOn){clearInterval(musicLoopId);musicLoopId=null;return;} scheduleLoop(); },2800);
}

function stopMusic(){
    if(musicLoopId){clearInterval(musicLoopId);musicLoopId=null;}
    musicNodes.forEach(n=>{try{n.stop();}catch(e){}});
    musicNodes=[];
    if(musicGain){musicGain.disconnect();musicGain=null;}
}

function toggleMusic(){
    musicOn=!musicOn;
    document.getElementById('music-btn').textContent=musicOn?'🎵 ON':'🔇 OFF';
    if(musicOn) buildMusic(); else stopMusic();
}

// ========== NICK & RANKING ==========
function getNick(){return localStorage.getItem('gm_nick')||'';}
function saveNick(n){if(n) localStorage.setItem('gm_nick',n); else localStorage.removeItem('gm_nick');}

// --- STORAGE POR USUÁRIO ---
// Com apelido: salva no localStorage com prefixo do nick (persiste)
// Sem apelido: usa sessionStorage (perde ao fechar)
function hasNick(){return !!(playerNick&&playerNick.trim()&&playerNick!=='Jogador');}

function storageKey(k){
    if(hasNick()) return 'gm_'+playerNick.trim()+'_'+k;
    return 'gm_guest_'+k;
}
function storageSave(k,v){
    const key=storageKey(k);
    if(hasNick()) localStorage.setItem(key,v);
    else sessionStorage.setItem(key,v);
}
function storageLoad(k,def=''){
    const key=storageKey(k);
    return (hasNick()?localStorage:sessionStorage).getItem(key)??def;
}
function storageRemove(k){
    const key=storageKey(k);
    localStorage.removeItem(key);
    sessionStorage.removeItem(key);
}

function getRanking(){return JSON.parse(localStorage.getItem('gm_ranking')||'[]');}
function saveToRanking(nick,score){
    if(!hasNick()) return; // sem apelido não entra no ranking
    const list=getRanking();
    const idx=list.findIndex(x=>x.nick===nick);
    if(idx>=0){if(score>list[idx].score)list[idx].score=score;}
    else list.push({nick,score});
    list.sort((a,b)=>b.score-a.score);
    localStorage.setItem('gm_ranking',JSON.stringify(list.slice(0,10)));
}

function openRanking(){
    AudioEngine.click();

    el.innerHTML=list.map((r,i)=>`
        <div class="rank-row ${r.nick===myNick?'rank-you':''}">
            <span class="rank-pos">${medals[i]||('#'+(i+1))}</span>
            <span class="rank-name">${r.nick}</span>

}

const MISSIONS_DEFS=[

];

function todayKey(){return new Date().toISOString().slice(0,10);}

function getMissionData(){
    const stored=JSON.parse(storageLoad('missions','{}'));
    if(stored.date!==todayKey()){
        const fresh={date:todayKey(),dayWins:0,dayCaps:0,dayKings:0,dayMoves:0,claimed:[]};
        storageSave('missions',JSON.stringify(fresh));
        return fresh;
    }
    return stored;
}

function saveMissionData(d){storageSave('missions',JSON.stringify(d));}

function incMissionStat(stat,v=1){
    const d=getMissionData(); d[stat]=(d[stat]||0)+v; saveMissionData(d);
}

function openMissions(){
    AudioEngine.click();
    const d=getMissionData();
    const el=document.getElementById('miss-list');
    el.innerHTML=MISSIONS_DEFS.map(m=>{
        const prog=Math.min(d[m.stat]||0,m.goal);
        const pct=Math.round(prog/m.goal*100);
        const done=prog>=m.goal;
        const claimed=(d.claimed||[]).includes(m.id);
        return `<div class="miss-card ${done?'done':''}">
            <div class="miss-title">${done?(claimed?'✅':'🎁')+' ':''} ${m.title}</div>
            <div class="miss-prog-bg"><div class="miss-prog-bar" style="width:${pct}%"></div></div>
            <div class="miss-reward">💰 +${m.reward} moedas &nbsp;|&nbsp; ${prog}/${m.goal}${done&&!claimed?' — <span style="color:#00b894;cursor:pointer" onclick="claimMission(\''+m.id+'\','+m.reward+')">COLETAR!</span>':''}</div>
        </div>`;
    }).join('');
    const tomorrow=new Date(); tomorrow.setDate(tomorrow.getDate()+1); tomorrow.setHours(0,0,0,0);
    const diff=Math.round((tomorrow-Date.now())/3600000);
    document.getElementById('miss-reset-info').textContent='Renova em '+diff+'h';
    document.getElementById('miss-overlay').style.display='block';
}

function claimMission(id,reward){
    const d=getMissionData();
    if((d.claimed||[]).includes(id))return;
    d.claimed=d.claimed||[]; d.claimed.push(id);
    saveMissionData(d);
    coins+=reward;
    document.getElementById('coins').innerText=coins;
    showToast('💰 +'+reward+' moedas coletadas!');
    AudioEngine.king();
    openMissions();
}

// ========== DICA (HINT) ==========
let hintUsed=false;
function showHint(){
    if(animating||(turn!=='red'&&gameMode==='ai')){showToast('Dica só no seu turno!',1500);return;}
    const moves=getAllMoves(turn);
    if(!moves.length)return;
    // Usa minimax depth 2 para sugerir melhor jogada (maximizing=true para o jogador atual)
    let best=-Infinity,bestM=moves[0];
    for(const m of moves){
        const nb=applyMoveBoard(board,m);
        const score=minimax(nb,1,-Infinity,Infinity,true,turn==='red'?'black':'red');
        // invertemos: queremos a jogada que mais prejudica o oponente
        const s2=minimax(nb,1,-Infinity,Infinity,false,turn);
        if(s2>best){best=s2;bestM=m;}
    }
    hintActive={r:bestM.r1,c:bestM.c1};
    hintUsed=true;
    render();
    showToast('💡 Dica: mova a peça que está piscando!',3000);
    setTimeout(()=>{hintActive=null;render();},3500);
    AudioEngine.click();
}

// ========== TIMER ==========
const TIMER_TOTAL=30;
function timerTotal(){ return lightningMode ? LIGHTNING_TIME : TIMER_TOTAL; }
function startTimer(){
    clearInterval(timerInterval); timeLeft=timerTotal(); updateTimerUI();
    timerInterval=setInterval(()=>{
        timeLeft--;updateTimerUI();
        if(timeLeft<=5){ AudioEngine.tick(); if(lightningMode) screenFlash('#f9ca24'); }
        if(timeLeft<=0){clearInterval(timerInterval);onTimeOut();}
    },1000);
}
function stopTimer(){clearInterval(timerInterval);}
function updateTimerUI(){
    const pct=(timeLeft/timerTotal())*100;
    const bar=document.getElementById('timer-bar');
    bar.style.width=pct+'%';
    bar.style.background=pct>50?'#27ae60':pct>25?'#e67e22':'#ff4757';
    document.getElementById('timer-num').textContent=timeLeft;
}
function onTimeOut(){
    log('⏱ Tempo esgotado! Turno passado.');
    showToast('⏱ Tempo esgotado!',2000);
    screenFlash('#ff4757');
    haptic([100,50,100]);
    turn=(turn==='red')?'black':'red'; selected=null; render();
    if(gameMode==='ai'&&turn==='black') setTimeout(aiMove,600);
    else startTimer();
}

function saveHistory(){
    history.push({board:board.map(r=>r.map(c=>c?{...c}:null)),turn,coins});
    if(history.length>10)history.shift();
}
function undoMove(){
    const steps=gameMode==='ai'?2:1; let popped=0;
    while(popped<steps&&history.length>0){const h=history.pop();board=h.board;turn=h.turn;coins=h.coins;popped++;}
    if(!popped){showToast('Nada para desfazer!');return;}
    selected=null;animating=false;stopTimer();startTimer();render();
    document.getElementById('coins').innerText=coins;
    AudioEngine.click();log('↩ Jogada desfeita.');
}

function openPhaseSelect(){

    el.innerHTML=PHASES.map(p=>{
        const done=maxPhase>=p.n;

        return `<div class="phase-card ${done?'done':next?'next':'locked'}" onclick="${!locked?`startPhase(${p.n})`:''}">

                <span class="phase-num">${locked?'🔒':done?'✅':'▶️'} ${p.label}</span>

            </div>
            <div class="phase-desc">${locked?'Complete a fase anterior':p.desc}</div>
        </div>`;
    }).join('');
    document.getElementById('phase-overlay').style.display='block';

function startPhase(n){
    closeOverlay('phase-overlay');
    const p=PHASES[n-1];
    const val=document.getElementById('nick-input').value.trim();
    playerNick=val||''; saveNick(playerNick);

function onPhaseWin(){
    const maxPhase=getMaxPhase();
    if(currentPhase>maxPhase){
        setMaxPhase(currentPhase);
        // Desbloqueia skin desta fase
        const skinUnlock=ALL_SKINS.find(s=>s.phase===currentPhase);
        if(skinUnlock){
            setTimeout(()=>{
                showToast(`🎁 SKIN DESBLOQUEADA: ${skinUnlock.emoji} ${skinUnlock.label}!`,4000);
                AudioEngine.king();
            },800);
        }
        if(currentPhase===15){
            setTimeout(()=>showToast('👑 PARABÉNS! Você completou todas as fases!',5000),1500);
        }
    }
    currentPhase=0;
}

function explodeAt(r,c){

// ========== MOVIMENTOS ==========
function getAllMoves(player){
    let moves=[];
    for(let r=0;r<size;r++)for(let c=0;c<size;c++)
        if(board[r][c]?.color===player)moves.push(...getPieceMoves(r,c));
    return moves;
}
function getSimpleMoves(r,c,bs){
    const p=bs[r][c];let list=[],dirs=[[1,1],[1,-1],[-1,1],[-1,-1]];
    dirs.forEach(d=>{
        for(let i=1;i<(p.king?size:2);i++){
            let nr=r+d[0]*i,nc=c+d[1]*i;
            if(nr<0||nr>=size||nc<0||nc>=size)break;
            if(!bs[nr][nc]){if(p.king||(p.color==='red'?d[0]===-1:d[0]===1))list.push({r1:r,c1:c,r2:nr,c2:nc,cap:[]});if(!p.king)break;}
            else break;
        }
    });
    return list;
}
function getCaptureMoves(r,c,bs,capSoFar,or,oc){
    const p=bs[r][c];let found=[],dirs=[[1,1],[1,-1],[-1,1],[-1,-1]];
    dirs.forEach(d=>{
        for(let i=1;i<(p.king?size:2);i++){
            let er=r+d[0]*i,ec=c+d[1]*i;
            if(er<0||er>=size||ec<0||ec>=size)break;
            const cell=bs[er][ec];
            if(!cell){if(!p.king)break;continue;}
            if(cell.color===p.color)break;
            if(capSoFar.some(cp=>cp.r===er&&cp.c===ec))break;
            let lS=i+1,lM=p.king?size:lS+1;
            for(let j=lS;j<lM;j++){
                let lr=r+d[0]*j,lc=c+d[1]*j;
                if(lr<0||lr>=size||lc<0||lc>=size)break;
                if(bs[lr][lc])break;
                let nb=bs.map(row=>row.map(x=>x?{...x}:null));
                nb[lr][lc]=nb[r][c];nb[r][c]=null;
                const nc2=[...capSoFar,{r:er,c:ec}];
                const further=getCaptureMoves(lr,lc,nb,nc2,or,oc);
                if(further.length>0)found.push(...further);
                else found.push({r1:or,c1:oc,r2:lr,c2:lc,cap:nc2});
                if(!p.king)break;
            }
            break;
        }
    });
    return found;
}
function getPieceMoves(r,c){const cap=getCaptureMoves(r,c,board,[],r,c);return cap.length>0?cap:getSimpleMoves(r,c,board);}

// ========== EXECUTE MOVE ==========
function executeMove(r1,c1,r2,c2,moves){
    if(animating)return;
    const m=moves.find(x=>x.r1===r1&&x.c1===c1&&x.r2===r2&&x.c2===c2);
    if(!m)return;
    animating=true; stopTimer(); saveHistory();
    const fromCell=getCellEl(r1,c1);
    const pieceEl=fromCell?fromCell.querySelector('.piece'):null;
    const doMove=()=>{
        const p=board[r1][c1];
        board[r2][c2]=p;board[r1][c1]=null;
        gameStats.moves++;
        incMissionStat('dayMoves');
        if(m.cap.length>0){
            AudioEngine.capture();
            haptic(m.cap.length>1 ? [80,40,80,40,120] : [60,30,60]);
            m.cap.forEach(cp=>{ explodeAt(cp.r,cp.c); board[cp.r][cp.c]=null; });
            const earned=20*m.cap.length;
            coins+=earned;
            spawnFloatCoin(m.cap[m.cap.length-1].r, m.cap[m.cap.length-1].c, earned);
            if(m.cap.length>=2) screenFlash('#ff4757');
            log(`${p.color==='red'?'🔴':'⚫'} capturou ${m.cap.length} peça(s)!`);
            gameStats.captures+=m.cap.length;
            if(m.cap.length>gameStats.maxChain)gameStats.maxChain=m.cap.length;
            incMissionStat('dayCaps',m.cap.length);
        } else {AudioEngine.move();}
        if(!p.king&&(r2===0||r2===size-1)){
            p.king=true;AudioEngine.king();log('👑 REI COROADO!');
            gameStats.kings++;incMissionStat('dayKings');
        }
        checkAchievements();
        animating=false;
        if(checkGameOver())return;
        turn=(turn==='red')?'black':'red';
        selected=null;hintActive=null;render();
        document.getElementById('coins').innerText=coins;
        if(gameMode==='ai'&&turn==='black')setTimeout(aiMove,600);
        else startTimer();
    };
    if(pieceEl)animatePiece(r1,c1,r2,c2,pieceEl,doMove);
    else doMove();
}

// ========== IA ==========
function applyMoveBoard(bs,m){
    const nb=bs.map(r=>r.map(x=>x?{...x}:null));
    nb[m.r2][m.c2]=nb[m.r1][m.c1];nb[m.r1][m.c1]=null;
    m.cap.forEach(cp=>nb[cp.r][cp.c]=null);
    if(nb[m.r2][m.c2]&&!nb[m.r2][m.c2].king&&(m.r2===0||m.r2===size-1))nb[m.r2][m.c2].king=true;
    return nb;
}
function getAllMovesBoard(bs,player){
    let moves=[];
    for(let r=0;r<size;r++)for(let c=0;c<size;c++){
        if(bs[r][c]?.color===player){const cap=getCaptureMoves(r,c,bs,[],r,c);moves.push(...(cap.length>0?cap:getSimpleMoves(r,c,bs)));}
    }
    return moves;
}
function scoreBoard(bs,player){
    let s=0;bs.flat().forEach(p=>{if(!p)return;const v=p.king?3:1;s+=p.color===player?v:-v;});return s;
}
function minimax(bs,depth,alpha,beta,maximizing,player){
    const opp=player==='black'?'red':'black';const cur=maximizing?player:opp;
    const moves=getAllMovesBoard(bs,cur);
    if(depth===0||moves.length===0)return scoreBoard(bs,player);
    if(maximizing){
        let best=-Infinity;
        for(const m of moves){const nb=applyMoveBoard(bs,m);best=Math.max(best,minimax(nb,depth-1,alpha,beta,false,player));alpha=Math.max(alpha,best);if(beta<=alpha)break;}
        return best;
    } else {
        let best=Infinity;
        for(const m of moves){const nb=applyMoveBoard(bs,m);best=Math.min(best,minimax(nb,depth-1,alpha,beta,true,player));beta=Math.min(beta,best);if(beta<=alpha)break;}
        return best;
    }
}
function aiMove(){
    const moves=getAllMoves('black');if(!moves.length){checkGameOver();return;}
    let choice;
    if(aiDifficulty==='easy'){
        const max=Math.max(...moves.map(m=>m.cap.length));
        const pool=moves.filter(m=>m.cap.length===max);
        choice=pool[Math.floor(Math.random()*pool.length)];
    } else {
        const depth=aiDifficulty==='hard'?4:2;let best=-Infinity;choice=moves[0];
        for(const m of moves){const nb=applyMoveBoard(board,m);const score=minimax(nb,depth-1,-Infinity,Infinity,false,'black');if(score>best){best=score;choice=m;}}
    }
    executeMove(choice.r1,choice.c1,choice.r2,choice.c2,moves);
}
